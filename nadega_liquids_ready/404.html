<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Страница не найдена | Nadega Liquids</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: #0a0a0f;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}

.container { max-width: 500px; }

.glitch {
  font-family: 'Orbitron', sans-serif;
  font-size: 8rem;
  font-weight: 900;
  background: linear-gradient(135deg, #00f0ff, #ff00aa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: glitch 2s infinite;
  line-height: 1;
}

@keyframes glitch {
  0%, 100% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(2px, -2px); }
  60% { transform: translate(-2px, -2px); }
  80% { transform: translate(2px, 2px); }
}

h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.5rem;
  margin: 1.5rem 0 1rem;
  color: #00f0ff;
}

p { color: #888; margin-bottom: 2rem; line-height: 1.6; }

.btn {
  display: inline-block;
  padding: 0.9rem 2rem;
  background: linear-gradient(135deg, rgba(0,240,255,0.2), rgba(139,92,246,0.15));
  border: 1px solid rgba(0,240,255,0.3);
  border-radius: 12px;
  color: white;
  text-decoration: none;
  font-weight: 600;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 30px rgba(0,240,255,0.2);
}

@media (max-width: 480px) {
  .glitch { font-size: 5rem; }
  h2 { font-size: 1.2rem; }
}
</style>
</head>
<body>
<div class="container">
  <div class="glitch">404</div>
  <h2>Страница не найдена</h2>
  <p>Похоже, вы заблудились в облаках пара.<br>Вернитесь на главную страницу.</p>
  <a href="/" class="btn">← На главную</a>
</div>
</body>
</html>
