<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nadega Liquids — Админ-панель</title>
<link rel="icon" type="image/jpeg" href="logo.jpg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --neon-cyan: #00f0ff;
  --neon-pink: #ff00aa;
  --neon-purple: #8b5cf6;
  --dark-bg: #0a0a0f;
  --card-bg: rgba(20, 20, 35, 0.6);
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.1);
  --text: #e0e0e0;
  --text-dim: #888;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--dark-bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.smoke-bg {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  z-index: -1;
  background: 
    radial-gradient(ellipse at 20% 50%, rgba(139, 92, 246, 0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(0, 240, 255, 0.1) 0%, transparent 50%),
    linear-gradient(180deg, #0a0a0f 0%, #0f0f1a 50%, #0a0a0f 100%);
}

header {
  padding: 1rem 1.5rem;
  background: rgba(10, 10, 15, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo-wrap {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  text-decoration: none;
}

.logo-img {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  object-fit: cover;
  border: 2px solid rgba(0, 240, 255, 0.3);
  box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
}

.logo-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-text span { font-weight: 400; opacity: 0.8; }

.glass-btn {
  padding: 0.7rem 1.8rem;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: white;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  overflow: hidden;
  transition: all 0.3s ease;
  border: 1px solid rgba(255,255,255,0.2);
  box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
  white-space: nowrap;
}

.glass-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.4), 0 0 30px rgba(0, 240, 255, 0.2);
  border-color: rgba(0, 240, 255, 0.4);
}

.glass-btn:active { transform: scale(0.98); }

.glass-btn.danger {
  background: linear-gradient(135deg, rgba(255,0,0,0.2), rgba(255,0,0,0.1));
  border-color: rgba(255,0,0,0.3);
}

.glass-btn.danger:hover {
  box-shadow: 0 0 30px rgba(255,0,0,0.3);
  border-color: rgba(255,0,0,0.5);
}

.glass-btn.success {
  background: linear-gradient(135deg, rgba(0,255,100,0.2), rgba(0,255,100,0.1));
  border-color: rgba(0,255,100,0.3);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem;
}

/* Login */
.login-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 10000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

.login-box {
  background: linear-gradient(135deg, rgba(20,20,35,0.95), rgba(10,10,20,0.95));
  border-radius: 24px;
  border: 1px solid var(--glass-border);
  padding: 2.5rem;
  width: 100%;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
}

.login-logo {
  width: 100px;
  height: 100px;
  border-radius: 20px;
  object-fit: cover;
  margin-bottom: 1.5rem;
  border: 2px solid rgba(0, 240, 255, 0.3);
  box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
}

.login-box h2 {
  font-family: 'Orbitron', sans-serif;
  margin-bottom: 2rem;
  font-size: 1.3rem;
}

.login-box input {
  width: 100%;
  padding: 1rem;
  margin-bottom: 1rem;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  color: white;
  font-size: 1rem;
  text-align: center;
  -webkit-appearance: none;
}

.login-box input:focus {
  outline: none;
  border-color: var(--neon-cyan);
  box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}

.tab-btn {
  padding: 0.7rem 1.2rem;
  border-radius: 12px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  color: var(--text-dim);
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 0.9rem;
  white-space: nowrap;
}

.tab-btn:hover, .tab-btn.active {
  border-color: var(--neon-cyan);
  color: white;
  background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(139, 92, 246, 0.15));
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
}

/* Cards */
.card {
  background: var(--card-bg);
  border-radius: 20px;
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  overflow-x: auto;
}

.card h3 {
  font-family: 'Orbitron', sans-serif;
  margin-bottom: 1.5rem;
  font-size: 1.1rem;
  color: white;
}

/* Form */
.form-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1rem;
  margin-bottom: 1rem;
}

.form-group label {
  display: block;
  margin-bottom: 0.5rem;
  color: var(--text-dim);
  font-size: 0.9rem;
}

.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 0.8rem 1rem;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  color: white;
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  transition: all 0.3s ease;
  -webkit-appearance: none;
}

.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none;
  border-color: var(--neon-cyan);
  box-shadow: 0 0 15px rgba(0, 240, 255, 0.1);
}

.form-group input::placeholder, .form-group textarea::placeholder {
  color: var(--text-dim);
}

/* Tables */
.data-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 500px;
}

.data-table th, .data-table td {
  padding: 0.8rem;
  text-align: left;
  border-bottom: 1px solid var(--glass-border);
}

.data-table th {
  color: var(--neon-cyan);
  font-weight: 600;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.data-table td {
  color: var(--text);
  font-size: 0.9rem;
}

.data-table tr:hover td {
  background: rgba(0, 240, 255, 0.05);
}

/* Category tags */
.cat-tag {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 1rem;
  background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(139, 92, 246, 0.1));
  border: 1px solid rgba(0, 240, 255, 0.3);
  border-radius: 10px;
  margin: 0.3rem;
  color: white;
  font-weight: 500;
  font-size: 0.9rem;
}

.cat-tag .remove {
  cursor: pointer;
  color: #ff4444;
  font-weight: 700;
  transition: color 0.2s;
  font-size: 1.1rem;
}

.cat-tag .remove:hover {
  color: #ff6666;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 1rem 2rem;
  background: linear-gradient(135deg, rgba(0, 240, 255, 0.2), rgba(139, 92, 246, 0.2));
  border: 1px solid var(--neon-cyan);
  border-radius: 12px;
  color: white;
  font-weight: 600;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 3000;
  opacity: 0;
  transition: all 0.4s ease;
  max-width: 90vw;
  text-align: center;
  word-break: break-word;
}

.toast.active {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

.hidden { display: none !important; }

/* Mobile */
@media (max-width: 768px) {
  header {
    padding: 0.8rem 1rem;
  }

  .logo-img {
    width: 32px;
    height: 32px;
  }

  .logo-text {
    font-size: 1rem;
  }

  .glass-btn {
    padding: 0.6rem 1.2rem;
    font-size: 0.85rem;
  }

  .container {
    padding: 1rem;
  }

  .login-box {
    padding: 1.5rem;
  }

  .login-logo {
    width: 80px;
    height: 80px;
  }

  .tabs {
    gap: 0.3rem;
  }

  .tab-btn {
    padding: 0.6rem 1rem;
    font-size: 0.85rem;
  }

  .card {
    padding: 1rem;
    border-radius: 16px;
  }

  .card h3 {
    font-size: 1rem;
  }

  .form-row {
    grid-template-columns: 1fr;
    gap: 0.8rem;
  }

  .data-table th, .data-table td {
    padding: 0.6rem;
    font-size: 0.85rem;
  }

  .cat-tag {
    padding: 0.4rem 0.8rem;
    font-size: 0.85rem;
  }
}

@media (max-width: 380px) {
  .logo-text {
    font-size: 0.85rem;
  }

  .tab-btn {
    padding: 0.5rem 0.8rem;
    font-size: 0.8rem;
  }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--dark-bg); }
::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }

::selection {
  background: rgba(0, 240, 255, 0.3);
  color: white;
}
</style>
</head>
<body>

<div class="smoke-bg"></div>

<!-- Login -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <img src="logo.jpg" alt="Nadega Liquids" class="login-logo">
    <div class="logo-text" style="font-size:1.3rem; margin-bottom:0.5rem; display:block">NADEGA <span>ADMIN</span></div>
    <h2>Вход в админ-панель</h2>
    <input type="password" id="password" placeholder="Введите пароль" onkeypress="if(event.key==='Enter')login()">
    <button class="glass-btn" style="width:100%; margin-top:1rem" onclick="login()">Войти</button>
  </div>
</div>

<!-- Main App -->
<div id="app" class="hidden">
  <header>
    <a href="/" class="logo-wrap">
      <img src="logo.jpg" alt="Nadega" class="logo-img">
      <div class="logo-text">NADEGA <span>ADMIN</span></div>
    </a>
    <button class="glass-btn" onclick="logout()">Выйти</button>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="setTab('products')">📦 Товары</button>
      <button class="tab-btn" onclick="setTab('add')">➕ Добавить</button>
      <button class="tab-btn" onclick="setTab('categories')">🏷️ Категории</button>
    </div>

    <!-- Products Tab -->
    <div id="tab-products">
      <div class="card">
        <h3>Список товаров</h3>
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead>
              <tr><th>ID</th><th>Название</th><th>Категория</th><th>Цена</th><th>Действия</th></tr>
            </thead>
            <tbody id="productsTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Add Product Tab -->
    <div id="tab-add" class="hidden">
      <div class="card">
        <h3>Добавить новый товар</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Название</label>
            <input type="text" id="newName" placeholder="Nadega ...">
          </div>
          <div class="form-group">
            <label>Категория</label>
            <select id="newCategory"></select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Цена (₽)</label>
            <input type="number" id="newPrice" placeholder="450">
          </div>
          <div class="form-group">
            <label>Изображение URL</label>
            <input type="text" id="newImage" placeholder="https://...">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Никотин / Батарея / Затяжки</label>
            <input type="text" id="newSpec1" placeholder="3mg / 18650 / 600">
          </div>
          <div class="form-group">
            <label>Объём / Мощность / Вкус</label>
            <input type="text" id="newSpec2" placeholder="30ml / 80W / Blue Razz">
          </div>
        </div>
        <div class="form-group" style="margin-bottom:1.5rem">
          <label>Описание</label>
          <textarea id="newDesc" rows="3" placeholder="Описание товара..."></textarea>
        </div>
        <button class="glass-btn success" onclick="addProduct()">✓ Добавить товар</button>
      </div>
    </div>

    <!-- Categories Tab -->
    <div id="tab-categories" class="hidden">
      <div class="card">
        <h3>Управление категориями</h3>
        <div style="margin-bottom:2rem">
          <div class="form-row" style="max-width:500px">
            <div class="form-group">
              <label>Новая категория</label>
              <input type="text" id="newCategoryName" placeholder="Название категории">
            </div>
          </div>
          <button class="glass-btn success" onclick="addCategory()">➕ Добавить категорию</button>
        </div>
        <h3 style="margin-bottom:1rem; font-size:1rem; font-family:'Orbitron',sans-serif">Существующие категории</h3>
        <div id="categoriesList"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ADMIN_PASSWORD = 'admin123';
let data = { categories: [], products: [] };
let currentTab = 'products';

function login() {
  const pass = document.getElementById('password').value;
  if (pass === ADMIN_PASSWORD) {
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    loadData();
  } else {
    showToast('Неверный пароль');
  }
}

function logout() {
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('password').value = '';
}

async function loadData() {
  try {
    const res = await fetch('/api/products');
    data = await res.json();
  } catch (e) {
    const saved = localStorage.getItem('nadega_products');
    if (saved) {
      data = JSON.parse(saved);
    } else {
      data = {
        categories: ["Жидкости", "Одноразки", "POD-системы"],
        products: [
          {id: 1, name: "Nadega Blue Ice", category: "Жидкости", price: 450, nicotine: "3mg", volume: "30ml", image: "https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400&h=300&fit=crop", description: "Освежающая голубика со льдом."},
          {id: 2, name: "Nadega Mango Tango", category: "Жидкости", price: 520, nicotine: "6mg", volume: "60ml", image: "https://images.unsplash.com/photo-1557800636-894a64c1696f?w=400&h=300&fit=crop", description: "Сочный манго."},
          {id: 6, name: "Elf Bar 600", category: "Одноразки", price: 350, puffs: "600", flavor: "Blue Razz", image: "https://images.unsplash.com/photo-1629198688000-71f23e745b6e?w=400&h=300&fit=crop", description: "Одноразка 600 затяжек."},
          {id: 11, name: "Voopoo Drag X", category: "POD-системы", price: 2800, battery: "18650", power: "80W", image: "https://images.unsplash.com/photo-1599639668312-5363a3b5b9f2?w=400&h=300&fit=crop", description: "80W POD."}
        ]
      };
    }
  }
  renderProducts();
  renderCategories();
  updateCategorySelect();
}

function saveData() {
  localStorage.setItem('nadega_products', JSON.stringify(data));
  fetch('/api/products', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(data)
  }).catch(() => {});
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  ['products', 'add', 'categories'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('hidden', t !== tab);
  });
  if (tab === 'products') renderProducts();
  if (tab === 'categories') renderCategories();
}

function renderProducts() {
  const tbody = document.getElementById('productsTable');
  tbody.innerHTML = data.products.map(p => `
    <tr>
      <td>${p.id}</td>
      <td>${p.name}</td>
      <td>${p.category}</td>
      <td>${p.price.toLocaleString('ru-RU')} ₽</td>
      <td>
        <button class="glass-btn danger" style="padding:0.4rem 0.8rem; font-size:0.8rem" onclick="deleteProduct(${p.id})">🗑 Удалить</button>
      </td>
    </tr>
  `).join('');
}

function renderCategories() {
  const list = document.getElementById('categoriesList');
  list.innerHTML = data.categories.map(c => `
    <span class="cat-tag">
      ${c}
      <span class="remove" onclick="deleteCategory('${c}')">×</span>
    </span>
  `).join('');
}

function updateCategorySelect() {
  const select = document.getElementById('newCategory');
  select.innerHTML = data.categories.map(c => `<option value="${c}">${c}</option>`).join('');
}

function addProduct() {
  const name = document.getElementById('newName').value.trim();
  const category = document.getElementById('newCategory').value;
  const price = parseInt(document.getElementById('newPrice').value) || 0;
  const image = document.getElementById('newImage').value.trim() || 'https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=400&h=300&fit=crop';
  const spec1 = document.getElementById('newSpec1').value.trim();
  const spec2 = document.getElementById('newSpec2').value.trim();
  const desc = document.getElementById('newDesc').value.trim();

  if (!name || !price) {
    showToast('Заполните название и цену');
    return;
  }

  const newId = Math.max(...data.products.map(p => p.id), 0) + 1;
  const product = { id: newId, name, category, price, image, description: desc };

  if (category === 'Жидкости') {
    if (spec1) product.nicotine = spec1;
    if (spec2) product.volume = spec2;
  } else if (category === 'Одноразки') {
    if (spec1) product.puffs = spec1;
    if (spec2) product.flavor = spec2;
  } else {
    if (spec1) product.battery = spec1;
    if (spec2) product.power = spec2;
  }

  data.products.push(product);
  saveData();

  document.getElementById('newName').value = '';
  document.getElementById('newPrice').value = '';
  document.getElementById('newImage').value = '';
  document.getElementById('newSpec1').value = '';
  document.getElementById('newSpec2').value = '';
  document.getElementById('newDesc').value = '';

  showToast('Товар добавлен!');
  setTab('products');
  renderProducts();
}

function deleteProduct(id) {
  if (!confirm('Удалить товар?')) return;
  data.products = data.products.filter(p => p.id !== id);
  saveData();
  renderProducts();
  showToast('Товар удалён');
}

function addCategory() {
  const name = document.getElementById('newCategoryName').value.trim();
  if (!name) {
    showToast('Введите название категории');
    return;
  }
  if (data.categories.includes(name)) {
    showToast('Такая категория уже есть');
    return;
  }
  data.categories.push(name);
  saveData();
  document.getElementById('newCategoryName').value = '';
  renderCategories();
  updateCategorySelect();
  showToast('Категория добавлена!');
}

function deleteCategory(name) {
  if (!confirm(`Удалить категорию "${name}"?`)) return;
  data.categories = data.categories.filter(c => c !== name);
  saveData();
  renderCategories();
  updateCategorySelect();
  showToast('Категория удалена');
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('active');
  setTimeout(() => toast.classList.remove('active'), 3000);
}
</script>
</body>
</html>
